<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Scorer: Unlimited Undo</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; padding: 10px; margin: 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .score-big { font-size: 3.2rem; font-weight: bold; color: #4ade80; text-align: center; margin: 5px 0; }
        .ov { color: #aaa; font-size: 1.2rem; text-align: center; margin-bottom: 5px;}
        .target-box { background: #3a2e15; color: #fbbf24; text-align: center; padding: 5px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; display: none; }
        
        .this-over-container { text-align: center; padding: 10px; background: #252525; border-radius: 8px; margin-bottom: 10px; font-size: 1rem; color: #aaa; }
        .ball-badge { display: inline-block; min-width: 20px; padding: 4px 8px; border-radius: 4px; margin: 2px; font-weight: bold; color: white; background: #444; }
        .bb-bound { background: #fbbf24; color: black; }
        .bb-wicket { background: #ef4444; }
        .bb-extra { background: #3b82f6; }
        
        .history-row { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 6px; font-size: 0.9rem; color: #ccc; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #fbbf24;}
        .history-bowler { font-weight: bold; color: white; }
        .history-balls { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end;}
        .hb-badge { padding: 3px 6px; border-radius: 4px; font-size: 0.8rem; background: #444; color: white; font-weight: bold;}

        .batter-row, .bowler-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-radius: 8px; margin: 5px 0; background: #252525; }
        .on-strike { border-left: 5px solid #4ade80; background: #2a3c2e; font-weight: bold; }
        .bowler-row { border-left: 5px solid #fbbf24; background: #3a2e15; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        button { padding: 18px 5px; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .run { background: #333; }
        .bound { background: #fbbf24; color: black; }
        .ext { background: #3b82f6; }
        .out { background: #ef4444; grid-column: span 2; }
        .swap { background: #8b5cf6; grid-column: span 2; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: center; }
        th { color: #777; font-size: 0.8rem; border-bottom: 1px solid #333; padding: 5px; text-align: center; }
        th:first-child, td:first-child { text-align: left; }
        td { padding: 8px 5px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .out-player { color: #888; text-decoration: line-through; }
        
        .setup-field { background: #252525; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-bottom: 10px;}
        h4 { margin: 0 0 10px 0; color: #4ade80; }
        
        .admin-btns { display: flex; gap: 10px; margin-bottom: 40px; margin-top: 15px; }
        .btn-admin { flex: 1; padding: 15px; background: #444; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }

        details summary { cursor: pointer; padding: 10px; background: #333; border-radius: 5px; font-weight: bold; outline: none; }
        details[open] summary { margin-bottom: 10px; }
        .prev-card-container { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #444; overflow-x: auto;}
    </style>
</head>
<body>

    <div id="setup-screen" class="card">
        <h3>Match Start</h3>
        <input type="number" id="max-overs" class="setup-field" placeholder="Total Overs per Innings" value="20">
        <input type="text" id="t1" class="setup-field" placeholder="Batting Team" value="Dunwoody Dashers">
        <input type="text" id="t2" class="setup-field" placeholder="Bowling Team">
        <input type="text" id="b1-init" class="setup-field" placeholder="Opener 1 Name">
        <input type="text" id="b2-init" class="setup-field" placeholder="Opener 2 Name">
        <input type="text" id="bwl-init" class="setup-field" placeholder="Opening Bowler Name">
        <button onclick="initMatch()" style="background:#4ade80; color:black; width:100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; font-weight: bold;">START MATCH</button>
    </div>

    <div id="score-screen" style="display:none;">
        
        <details id="prev-innings-card" class="card" style="display:none; border-color:#555;">
            <summary style="color:#fbbf24;">🏏 View 1st Innings Scorecard</summary>
            <div id="prev-innings-content" class="prev-card-container"></div>
        </details>

        <div class="card">
            <div id="target-disp" class="target-box">Target: --</div>
            <div class="score-big" id="main-score">0 - 0</div>
            <div class="ov" id="main-overs">Overs: 0.0</div>
            
            <div class="this-over-container">
                This Over: <span id="this-over-tracker"></span>
            </div>
        </div>

        <div class="card" id="history-log-card" style="display:none;">
            <h4 style="color: #aaa; font-size: 0.9rem; margin-bottom: 8px;">Previous Overs</h4>
            <div id="history-log-list"></div>
        </div>

        <div class="card">
            <div id="row-b1" class="batter-row">
                <span id="name-b1"></span> <span id="stat-b1">0(0)</span>
            </div>
            <div id="row-b2" class="batter-row">
                <span id="name-b2"></span> <span id="stat-b2">0(0)</span>
            </div>
            <div class="bowler-row">
                <span id="name-bwl"></span> <span id="stat-bwl"></span>
            </div>
        </div>

        <div class="btn-grid">
            <button class="run" onclick="ball(0)">0</button>
            <button class="run" onclick="ball(1)">1</button>
            <button class="run" onclick="ball(2)">2</button>
            <button class="run" onclick="ball(3)">3</button>
            <button class="bound" onclick="ball(4)">4</button>
            <button class="bound" onclick="ball(6)">6</button>
            <button class="ext" onclick="extra('wd')">WD</button>
            <button class="ext" onclick="extra('nb')">NB</button>
            <button class="swap" onclick="swap()">SWAP STRIKE</button>
            <button class="out" onclick="wicket()">WICKET</button>
        </div>

        <div class="card" style="margin-top: 15px;">
            <h4>Batting Scorecard</h4>
            <table>
                <thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th></tr></thead>
                <tbody id="bat-scorecard"></tbody>
            </table>
        </div>

        <div class="card">
            <h4 style="color: #fbbf24;">Bowling Scorecard</h4>
            <table>
                <thead><tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th></tr></thead>
                <tbody id="bwl-scorecard"></tbody>
            </table>
        </div>

        <div class="admin-btns">
            <button id="undo-btn" class="btn-admin" onclick="undo()">Undo</button>
            <button class="btn-admin" style="background:#8b5cf6;" onclick="manualEndInnings()">End Innings</button>
            <button class="btn-admin" style="background:#ef4444;" onclick="resetMatch()">New Match</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('cricket_v13')) || {
            active: false, innings: 1, target: null, maxOvers: 20, runs: 0, wickets: 0, balls: 0,
            striker: "b1", thisOver: [], oversHistory: [],
            b1: {name: "", r: 0, b: 0, f: 0, s: 0, out: false},
            b2: {name: "", r: 0, b: 0, f: 0, s: 0, out: false},
            others: [], currBwl: "", bowlers: {}, history: [],
            innings1Data: null 
        };

        function initMatch() {
            state.maxOvers = parseInt(document.getElementById('max-overs').value) || 20;
            state.b1.name = document.getElementById('b1-init').value || "Batter 1";
            state.b2.name = document.getElementById('b2-init').value || "Batter 2";
            state.currBwl = document.getElementById('bwl-init').value || "Bowler 1";
            state.bowlers[state.currBwl] = {o: 0, b: 0, r: 0, w: 0, wd: 0, nb: 0};
            state.active = true;
            render();
        }

        function getOvers(b) { return `${Math.floor(b/6)}.${b%6}`; }

        function getBallHtml(b) {
            let cls = 'ball-badge';
            if(b == '4' || b == '6') cls += ' bb-bound';
            else if(b == 'W') cls += ' bb-wicket';
            else if(typeof b === 'string' && (b.includes('WD') || b.includes('NB'))) cls += ' bb-extra';
            return `<span class="${cls}">${b}</span>`;
        }

        function renderThisOver() {
            let html = state.thisOver.map(getBallHtml).join('');
            document.getElementById('this-over-tracker').innerHTML = html || '-';
        }

        function renderHistoryLog() {
            let card = document.getElementById('history-log-card');
            let list = document.getElementById('history-log-list');
            
            if(state.oversHistory.length === 0) {
                card.style.display = 'none';
                return;
            }
            
            card.style.display = 'block';
            let html = state.oversHistory.map((ov, idx) => {
                let ballsHtml = ov.balls.map(b => `<span class="hb-badge" style="${b=='W'?'background:#ef4444;':b=='4'||b=='6'?'background:#fbbf24;color:black;':b.toString().includes('WD')||b.toString().includes('NB')?'background:#3b82f6;':''}">${b}</span>`).join('');
                return `<div class="history-row">
                    <span><span style="color:#aaa; font-size:0.8rem;">Ov ${idx + 1}</span> <span class="history-bowler">${ov.bowler}</span></span>
                    <span class="history-balls">${ballsHtml}</span>
                </div>`;
            }).reverse().join(''); 
            list.innerHTML = html;
        }

        function render() {
            if(!state.active) return;
            document.getElementById('setup-screen').style.display = "none";
            document.getElementById('score-screen').style.display = "block";
            
            // Undo Button UI Update - Shows exact number of available undos
            let uBtn = document.getElementById('undo-btn');
            if(state.history.length > 0) {
                uBtn.innerText = `Undo (${state.history.length})`;
                uBtn.style.opacity = "1";
            } else {
                uBtn.innerText = "Undo";
                uBtn.style.opacity = "0.5";
            }

            // 1st Innings Snapshot Logic
            let prevCard = document.getElementById('prev-innings-card');
            if (state.innings === 2 && state.innings1Data) {
                prevCard.style.display = "block";
                let d = state.innings1Data;
                let html = `<h4 style="text-align:center; color:white;">1st Innings Total: ${d.runs}/${d.wickets} (${getOvers(d.balls)} Ov)</h4>`;
                html += `<table><thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th></tr></thead><tbody>`;
                d.batters.forEach(b => {
                    let cls = b.out ? "out-player" : "";
                    html += `<tr class="${cls}"><td>${b.name}</td><td>${b.r}</td><td>${b.b}</td><td>${b.f}</td><td>${b.s}</td></tr>`;
                });
                html += `</tbody></table>`;
                html += `<h4 style="color:#fbbf24; margin-top:15px; margin-bottom:5px;">Bowling</h4>`;
                html += `<table><thead><tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th></tr></thead><tbody>`;
                for(let bName in d.bowlers) {
                    let s = d.bowlers[bName];
                    html += `<tr><td>${bName}</td><td>${getOvers(s.b)}</td><td>0</td><td>${s.r}</td><td><strong>${s.w}</strong></td></tr>`;
                }
                html += `</tbody></table>`;
                document.getElementById('prev-innings-content').innerHTML = html;

                let tb = document.getElementById('target-disp');
                tb.style.display = "block";
                tb.innerText = `Target: ${state.target} (Need ${state.target - state.runs} runs from ${(state.maxOvers*6)-state.balls} balls)`;
            } else {
                prevCard.style.display = "none";
            }

            document.getElementById('main-score').innerText = `${state.runs} - ${state.wickets}`;
            document.getElementById('main-overs').innerText = `Overs: ${getOvers(state.balls)} / ${state.maxOvers}`;
            
            renderThisOver();
            renderHistoryLog();

            document.getElementById('name-b1').innerText = state.b1.name + (state.striker === 'b1' ? '*' : '');
            document.getElementById('name-b2').innerText = state.b2.name + (state.striker === 'b2' ? '*' : '');
            document.getElementById('stat-b1').innerText = `${state.b1.r}(${state.b1.b})`;
            document.getElementById('stat-b2').innerText = `${state.b2.r}(${state.b2.b})`;

            document.getElementById('row-b1').className = state.striker === 'b1' ? 'batter-row on-strike' : 'batter-row';
            document.getElementById('row-b2').className = state.striker === 'b2' ? 'batter-row on-strike' : 'batter-row';

            let cb = state.bowlers[state.currBwl];
            document.getElementById('name-bwl').innerText = `🏏 ${state.currBwl}`;
            document.getElementById('stat-bwl').innerText = `${getOvers(cb.b)} - ${cb.r} - ${cb.w}`;

            const batTable = document.getElementById('bat-scorecard');
            batTable.innerHTML = "";
            state.others.forEach(p => { batTable.innerHTML += `<tr class="out-player"><td>${p.name}</td><td>${p.r}</td><td>${p.b}</td><td>${p.f}</td><td>${p.s}</td></tr>`; });
            batTable.innerHTML += `<tr><td>${state.b1.name}*</td><td>${state.b1.r}</td><td>${state.b1.b}</td><td>${state.b1.f}</td><td>${state.b1.s}</td></tr>`;
            batTable.innerHTML += `<tr><td>${state.b2.name}*</td><td>${state.b2.r}</td><td>${state.b2.b}</td><td>${state.b2.f}</td><td>${state.b2.s}</td></tr>`;
            
            const bwlTable = document.getElementById('bwl-scorecard');
            bwlTable.innerHTML = "";
            for (let bName in state.bowlers) {
                let s = state.bowlers[bName];
                let isCurr = (bName === state.currBwl) ? "*" : "";
                let econ = s.b === 0 ? "0.00" : (s.r / (s.b / 6)).toFixed(2);
                bwlTable.innerHTML += `<tr><td>${bName}${isCurr}</td><td>${getOvers(s.b)}</td><td>0</td><td>${s.r}</td><td><strong>${s.w}</strong></td><td>${econ}</td></tr>`;
            }
            localStorage.setItem('cricket_v13', JSON.stringify(state));
        }

        function checkOverAndInnings() {
            if (state.innings === 2 && state.runs >= state.target) {
                render(); setTimeout(() => alert("Match Over! Batting Team Wins!"), 200); return;
            }
            if (state.wickets >= 10 || state.balls >= (state.maxOvers * 6)) {
                if (state.innings === 1) processInningsBreak();
                else { render(); setTimeout(() => alert("Match Over! Bowling Team Wins!"), 200); }
                return;
            }
            if (state.balls > 0 && state.balls % 6 === 0) {
                state.oversHistory.push({ bowler: state.currBwl, balls: [...state.thisOver] });
                state.thisOver = []; 
                let nextBwl = prompt("End of Over! Enter next bowler's name:");
                while(!nextBwl || nextBwl.trim() === "") nextBwl = prompt("Required: Enter bowler's name:");
                state.currBwl = nextBwl.trim();
                if (!state.bowlers[state.currBwl]) state.bowlers[state.currBwl] = {o: 0, b: 0, r: 0, w: 0, wd: 0, nb: 0};
            }
        }

        function processInningsBreak() {
            let activeB1 = {...state.b1, name: state.b1.name + "*", out: false};
            let activeB2 = {...state.b2, name: state.b2.name + "*", out: false};
            
            if (state.thisOver.length > 0) state.oversHistory.push({ bowler: state.currBwl, balls: [...state.thisOver] });

            state.innings1Data = {
                runs: state.runs, wickets: state.wickets, balls: state.balls,
                batters: [...state.others, activeB1, activeB2].filter(b => b.b > 0 || b.r > 0),
                bowlers: JSON.parse(JSON.stringify(state.bowlers)),
                oversHistory: JSON.parse(JSON.stringify(state.oversHistory))
            };

            state.target = state.runs + 1;
            alert(`First Innings Complete! Target is ${state.target}. Ready for 2nd Innings.`);
            
            state.innings = 2;
            state.runs = 0; state.wickets = 0; state.balls = 0;
            state.thisOver = []; state.oversHistory = []; state.others = []; state.bowlers = {};
            state.history = []; // History clears when changing innings to save memory
            
            state.b1 = {name: prompt("Innings 2 - Opener 1 Name:") || "Batter 1", r: 0, b: 0, f: 0, s: 0, out: false};
            state.b2 = {name: prompt("Innings 2 - Opener 2 Name:") || "Batter 2", r: 0, b: 0, f: 0, s: 0, out: false};
            state.currBwl = prompt("Innings 2 - Opening Bowler:") || "Bowler 1";
            state.bowlers[state.currBwl] = {o: 0, b: 0, r: 0, w: 0, wd: 0, nb: 0};
            state.striker = "b1";
            render();
        }

        function manualEndInnings() {
            if(confirm("Declare / Force End this innings?")) {
                pushHistory();
                if(state.innings === 1) processInningsBreak();
                else alert("Match Over!");
            }
        }

        function ball(r) {
            pushHistory();
            state.runs += r; state.balls += 1; state.thisOver.push(r);
            state[state.striker].r += r; state[state.striker].b += 1;
            if (r === 4) state[state.striker].f += 1;
            if (r === 6) state[state.striker].s += 1;
            state.bowlers[state.currBwl].r += r; state.bowlers[state.currBwl].b += 1;
            if (r % 2 !== 0 || state.balls % 6 === 0) swap(false);
            render(); checkOverAndInnings();
        }

        function extra(type) { 
            let addR = parseInt(prompt(`Extra runs scored on this ${type.toUpperCase()}? (Enter 0 if none)`, "0"));
            if (isNaN(addR)) return;
            pushHistory(); 
            let total = 1 + addR;
            state.runs += total; state.bowlers[state.currBwl].r += total;
            let label = type.toUpperCase() + (addR > 0 ? '+'+addR : '');
            state.thisOver.push(label);
            if (type === 'nb') {
                state[state.striker].r += addR; state[state.striker].b += 1;
                if (addR === 4) state[state.striker].f += 1;
                if (addR === 6) state[state.striker].s += 1;
            }
            if (addR % 2 !== 0) swap(false);
            render(); checkOverAndInnings();
        }
        
        function swap(m=true) { if(m) pushHistory(); state.striker = state.striker === 'b1' ? 'b2' : 'b1'; render(); }

        function wicket() {
            if(state.wickets >= 10) return;
            pushHistory();
            state.wickets += 1; state.balls += 1; state.thisOver.push('W');
            state[state.striker].b += 1; state.bowlers[state.currBwl].b += 1; state.bowlers[state.currBwl].w += 1;
            state.others.push({...state[state.striker], out: true});
            
            if (state.wickets < 10) {
                let nextName = prompt("WICKET! Who is the new batsman?");
                state[state.striker] = {name: nextName || "Batter " + (state.wickets + 2), r: 0, b: 0, f: 0, s: 0, out: false};
            }
            if (state.balls % 6 === 0) swap(false);
            render(); checkOverAndInnings();
        }

        function pushHistory() { 
            let snap = JSON.parse(JSON.stringify(state)); 
            snap.history = []; // Strip out history so we don't duplicate memory infinitely
            state.history.push(JSON.stringify(snap));
            // No limit! It will keep pushing as long as the innings goes on.
        }

        function undo() { 
            if(state.history.length > 0) { 
                let prevStr = state.history.pop(); // Grab the last state
                let preservedHistory = state.history; // Save the remaining stack
                
                state = JSON.parse(prevStr); // Overwrite current state
                state.history = preservedHistory; // Plug the stack back in
                
                render(); 
            } 
        }

        function resetMatch() {
            if(confirm("Are you sure you want to erase this match completely and start a new one?")) {
                localStorage.removeItem('cricket_v13');
                location.reload();
            }
        }

        render();
    </script>
</body>
</html>
